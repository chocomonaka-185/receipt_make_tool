<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>領収書用データ作成</title>
<style>
  body {
   font-family: sans-serif; margin: 20px;
   user-select: none;
   -webkit-user-select: none;
   -ms-user-select: none;
  }
  h1 { margin-bottom: 10px; }
  button { margin: 2px; }
  table { border-collapse: collapse; margin-top: 10px; width: 100%; }
  th, td { border: 1px solid #ccc; padding: 4px 8px; text-align: left; }
  th { background: #f0f0f0; font-size:9pt; }
  .right { text-align: right; }
  dialog { border: none; padding: 20px; border-radius: 4px; box-shadow: 0 0 10px rgba(0,0,0,.3); }
  dialog form { display: grid; grid-template-columns: 150px 1fr; gap: 6px 10px; }
  dialog label { text-align: right; }
  dialog .buttons { grid-column: 1 / 3; text-align: right; margin-top: 10px; }
  input[type="text"], input[type="date"], input[type="number"] { width: 100%; box-sizing: border-box; }
  
  dialog form#csvForm { display: block; }
  span#msg {
  	color:#f00;
  	font-size:10pt;
  }
  
  .radio-block {
	  text-align: right;
	}

  tr.selected {
    background-color: #d0ebff;
  }

  input, textarea {
    user-select: text;
  }
  
  tr.dragging {
    opacity: 0.4;
  }
  
  tr.drop-target-top {
	  border-top: 3px solid #007bff;
	}

	tr.drop-target-bottom {
	  border-bottom: 3px solid #007bff;
	}

</style>
</head>
<body>
<dialog id="csvDialog">
  <form method="dialog" id="csvForm">
　　
    <p>表の全データをCSVファイルとして保存します</p>

    <label>CSV File Name: </label>
    <p>
	<input type="text" id="csvFileName" style="width:85%;" placeholder="拡張子を除くファイル名" required> .csv
    </p>
    <br>

    <div class="buttons" style="margin-top:10px; text-align:right;">
      <button type="button" id="csvCancelBtn">キャンセル</button>
      <button type="submit" id="csvOkBtn" disabled>ダウンロード</button>
    </div>
  </form>
</dialog>

<dialog id="deleteSelectedDialog">
  <p>選択されているすべての行を削除します。よろしいですか？</p>
  <div style="text-align:right; margin-top:10px;">

  let undoStack = [];

  function cloneData(d) {
    return d.map(r => ({...r}));
  }

  function pushUndo() {
    undoStack.push(cloneData(data));
    if (undoStack.length > 100) undoStack.shift();
    redoStack = [];
    updateUndoRedoButtons();
  }

  function updateUndoRedoButtons() {
    undoBtn.disabled = undoStack.length === 0;
    redoBtn.disabled = redoStack.length === 0;
    loadCsvBtn.disabled = data.length !== 0;
    downloadCsvBtn.disabled = data.length === 0;
    addSamaBtn.disabled = data.length === 0;
    checkAll.disabled = data.length === 0;
    
    // 選択行が 0 のときは削除ボタンを無効化
  const anyChecked = document.querySelector('.rowCheck:checked') !== null;
  deleteSelectedBtn.disabled = !anyChecked;

	copySelectedBtn.disabled = !anyChecked;

	const checkedRows = document.querySelectorAll('.rowCheck:checked');
	editRowBtn.disabled = (checkedRows.length !== 1);

    checkAll.checked = (document.querySelectorAll('.rowCheck:checked').length === data.length && data.length > 0);
    
    // 選択行数の表示更新
	const selectedCount = document.querySelectorAll('.rowCheck:checked').length;
	document.getElementById('selectedCountDisplay').textContent =
	  `選択中の行数: ${selectedCount}`;

  function renderTable() {
    tableBody.innerHTML = '';
    data.forEach((row, index) => {

      const tr = document.createElement('tr');

      tr.draggable = true;

		// --- ドラッグ開始 ---
		tr.addEventListener('dragstart', (e) => {
		  const checks = document.querySelectorAll('.rowCheck');
		  const rowIndex = index;

		  const sel = getSelectionState();

		  // 何も選択されていない → ドラッグ禁止
		  if (sel.count === 0) {
		    e.preventDefault();
		    return;
		  }

		  // 非連続で複数選択されている → ドラッグ禁止
		  if (sel.count > 1 && !sel.continuous) {
		    e.preventDefault();
		    return;
		  }

		  // 1行だけ選択 → その行だけドラッグ
		  if (sel.count === 1) {
		    // その1行が今ドラッグしようとしている行でなければ禁止
		    if (!checks[rowIndex].checked) {
		      e.preventDefault();
		      return;
		    }
		    dragRange = { start: rowIndex, end: rowIndex };
		  }
		  // 複数行かつ連続 → その範囲のみドラッグ可能
		  else {
		    // 選択範囲外の行からドラッグ開始しようとしたら禁止
		    if (rowIndex < sel.start || rowIndex > sel.end) {
		      e.preventDefault();
		      return;
		    }
		    dragRange = { start: sel.start, end: sel.end };
		  }

		  dragStartIndex = rowIndex;
		  tr.classList.add('dragging');
		});

		// --- ドラッグ終了 ---
		tr.addEventListener('dragend', () => {
		  tr.classList.remove('dragging');
		});
		
		// --- ドラッグオーバー（ドロップ可能にする） ---
		tr.addEventListener('dragover', (e) => {
		  e.preventDefault();
		  if (!dragRange) return;

		  clearDropGuides();

		  const targetIndex = index;

		  // 選択範囲の中にはドロップ不可
		  if (targetIndex >= dragRange.start && targetIndex <= dragRange.end) return;

		  const rect = tr.getBoundingClientRect();
		  const offset = e.clientY - rect.top;

		  if (offset < rect.height / 2) {
		    tr.classList.add('drop-target-top');
		  } else {
		    tr.classList.add('drop-target-bottom');
		  }
		});

		// --- ドロップ ---
		tr.addEventListener('drop', (e) => {
		  e.preventDefault();

		  if (!dragRange) return;

		  const targetIndex = index;

		  // ドロップ先が選択範囲の中なら無視
		  if (targetIndex >= dragRange.start && targetIndex <= dragRange.end) return;

		  pushUndo();

		  const movingRows = data.slice(dragRange.start, dragRange.end + 1);

		  // 元の位置から削除
		  data.splice(dragRange.start, movingRows.length);

		  // 新しい挿入位置を調整
		  let insertIndex = targetIndex;
		  if (targetIndex > dragRange.start) {
		    insertIndex = targetIndex - movingRows.length + 1;
		  }

		  // 挿入
		  data.splice(insertIndex, 0, ...movingRows);

		  renderTable();
		  updateUndoRedoButtons();

		  dragRange = null;
		  
		  clearDropGuides();
		});
		
		
		// dragleave
		tr.addEventListener('dragleave', () => {
		  clearDropGuides();
		});


      // チェックボックス列
		const tdCheck = document.createElement('td');
		const cb = document.createElement('input');
		cb.type = 'checkbox';
		cb.className = 'rowCheck';
		
		cb.addEventListener('change', () => {
                  if (cb.checked) {
                      tr.classList.add('selected');
                  } else {
                      tr.classList.remove('selected');
                  }

		  updateUndoRedoButtons();
		});
		
		tdCheck.appendChild(cb);
		tr.appendChild(tdCheck);

      // 行クリックで選択トグル
      tr.addEventListener('click', (e) => {
        if (e.target.type === 'checkbox') return;

        const rowIndex = index;

        // --- Shift+クリック（範囲選択） ---
        if (e.shiftKey && lastClickedRowIndex !== null) {
          const start = Math.min(lastClickedRowIndex, rowIndex);
          const end = Math.max(lastClickedRowIndex, rowIndex);

          for (let i = start; i <= end; i++) {
            const cb2 = tableBody.querySelectorAll('.rowCheck')[i];
            const tr2 = cb2.closest('tr');
            cb2.checked = true;
            tr2.classList.add('selected');
          }
          updateUndoRedoButtons();
          return;
        }

        // --- 通常クリック（単体トグル） ---
        cb.checked = !cb.checked;

        if (cb.checked) {
          tr.classList.add('selected');
        } else {
          tr.classList.remove('selected');
        }

        lastClickedRowIndex = rowIndex;
        updateUndoRedoButtons();
      });

		

      const tdIndex = document.createElement('td');
      tdIndex.textContent = index + 1;
      tdIndex.className = 'right';
      tr.appendChild(tdIndex);

      const tdMng = document.createElement('td');
      tdMng.textContent = row.mngNo || '';
      tr.appendChild(tdMng);

      const tdDate = document.createElement('td');
      tdDate.textContent = row.date || '';
      tr.appendChild(tdDate);

      const tdName = document.createElement('td');
      tdName.textContent = row.toName || '';
      tr.appendChild(tdName);

      const tdAmt1 = document.createElement('td');
      tdAmt1.textContent = row.amount1;
      tdAmt1.className = 'right';
      tr.appendChild(tdAmt1);
      
      const tdAmt1_x010 = document.createElement('td');
      tdAmt1_x010.textContent = row.amount1*0.1;
      tdAmt1_x010.className = 'right';
      tr.appendChild(tdAmt1_x010);

      const tdAmt2 = document.createElement('td');
      tdAmt2.textContent = row.amount2;
      tdAmt2.className = 'right';
      tr.appendChild(tdAmt2);

      const tdAmt2_x008 = document.createElement('td');
      tdAmt2_x008.textContent = row.amount2*0.08;
      tdAmt2_x008.className = 'right';
      tr.appendChild(tdAmt2_x008);
      
      const tdAmt3 = document.createElement('td');
      tdAmt3.textContent = row.amount3;
      tdAmt3.className = 'right';
      tr.appendChild(tdAmt3);

      const tdNote = document.createElement('td');
      tdNote.textContent = row.note || '';
      tr.appendChild(tdNote);
      updateUndoRedoButtons();
      
      checkAll.checked = false;

//      const tdDel = document.createElement('td');
//      const delBtn = document.createElement('button');
//      delBtn.textContent = '削除';
//      delBtn.addEventListener('click', () => {
//        pushUndo();
//        data.splice(index, 1);
//        renderTable();
//        updateUndoRedoButtons();
//     });
//      tdDel.appendChild(delBtn);
//      tr.appendChild(tdDel);

      tableBody.appendChild(tr);
    });
  }

rowForm.addEventListener('submit', (e) => {
  e.preventDefault();

  let dateVal = String(document.getElementById('date_0_input').value).replace(/\-/g,".");
  if (radioDate1.checked) {
    dateVal = String(document.getElementById('date_1_input').value);
  }

  if (String(dateVal).length === 0) {
    document.getElementById('msg').textContent = "日付または年が未入力です　　";
    return false;
  }

  const newRow = {
    mngNo: document.getElementById('mngNo').value.trim(),
    date: dateVal,
    toName: document.getElementById('toName').value.trim(),
    amount1: document.getElementById('amount1').value.trim(),
    amount2: document.getElementById('amount2').value.trim(),
    amount3: document.getElementById('amount3').value.trim(),
    note: document.getElementById('note').value.trim()
  };

  pushUndo();

  if (editingIndex === null) {
    // 新規追加
    data.push(newRow);
  } else {
    // 編集
    data[editingIndex] = newRow;
  }

  editingIndex = null;  // リセット
  renderTable();
  rowDialog.close();
});

    if (undoStack.length === 0) return;

    data = undoStack.pop();

    csvFileInput.value = '';
    csvFileInput.click();

  });

  csvFileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const text = reader.result;
      const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n').filter(l => l.trim() !== '');
      if (lines.length === 0) return;

      // 1行目はヘッダ (#管理番号,日付,宛名,金額１,金額１x0.1,金額２,金額２x0.08,金額３,但書 などを想定)
      const header = lines[0].split(',');
      // 先頭の#を削る
      if (header[0].startsWith('#')) header[0] = header[0].substring(1);

      const newData = [];
      for (let i = 1; i < lines.length; i++) {
        const cols = lines[i].split(',');
        if (cols.length === 1 && cols[0].trim() === '') continue;
        if (String(cols[3]).length === 0) cols[4]='0';
        if (String(cols[5]).length === 0) cols[6]='0';
        newData.push({
          mngNo: cols[0] || '',
          date: cols[1] || '',
          toName: cols[2] || '',
          amount1: cols[3] || '',
          amount1_x010: cols[4] || '',
          amount2: cols[5] || '',
          amount2_x008: cols[6] || '',
          amount3: cols[7] || '',
          note: cols[8] || ''
        });
      }
      pushUndo();
      data = newData;
      renderTable();
    };
    reader.readAsText(file, 'UTF-8');
  });

// CSVダウンロード用ダイアログ
const csvDialog = document.getElementById('csvDialog');
const csvForm = document.getElementById('csvForm');
const csvFileNameInput = document.getElementById('csvFileName');
const csvCancelBtn = document.getElementById('csvCancelBtn');
const csvOkBtn = document.getElementById('csvOkBtn');

// ダウンロードボタン押下 → ダイアログ表示
downloadCsvBtn.addEventListener('click', () => {
  csvForm.reset();
  csvOkBtn.disabled = true;
  csvDialog.showModal();
});

// 入力チェック（未入力ならダウンロード不可）
csvFileNameInput.addEventListener('input', () => {
  csvOkBtn.disabled = csvFileNameInput.value.trim() === '';
});

// キャンセル
csvCancelBtn.addEventListener('click', () => {
  csvDialog.close();
});

// ダウンロード確定
csvForm.addEventListener('submit', (e) => {
  e.preventDefault();

  let fileName = csvFileNameInput.value.trim();
  if (!fileName) return;
  fileName += '.csv';
  
  // CSV生成
  //const header = ['#管理番号','日付','金額１','金額１_x010','金額２','金額２_x008','金額３','但書'];
  const table = document.getElementById("dataTable");
  const headers = Array.from(table.querySelectorAll("th")).map(th => th.textContent.trim());
  let header = ['#'+headers[2]];
  header.push(...headers.slice(3));


  const lines = [];
  lines.push(header.join(','));

  data.forEach(row => {
  	if(String(row.amount1).length===0) row.amount1_x010 = '';
  	if(String(row.amount2).length===0) row.amount2_x008 = '';
  
    const cols = [
      row.mngNo || '',
      row.date || '',
      row.toName || '',
      row.amount1 || '',
      row.amount1_x010 || '',
      row.amount2 || '',
      row.amount2_x008 || '',
      row.amount3 || '',
      row.note || ''
    ];
    lines.push(cols.map(v => v.replace(/"/g, '""')).join(','));
  });

  const csvContent = lines.join('\n');
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);

  const a = document.createElement('a');
  a.href = url;
  a.download = fileName;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  csvDialog.close();
});

  deleteSelectedDialog.showModal();

// OK → 選択行削除
deleteSelectedOkBtn.addEventListener('click', () => {
  const rowChecks = document.querySelectorAll('.rowCheck');
  pushUndo();

  // 上から削除すると index がずれるので逆順で削除
  for (let i = rowChecks.length - 1; i >= 0; i--) {
    if (rowChecks[i].checked) {
      data.splice(i, 1);
    }
  }

  renderTable();
  updateUndoRedoButtons();

});

// ヘッダーのチェック → 全行トグル
//checkAll.addEventListener('change', () => {
//  const rowChecks = document.querySelectorAll('.rowCheck');
//  rowChecks.forEach(cb => cb.checked = checkAll.checked);
//  updateUndoRedoButtons();
//});
checkAll.addEventListener('change', () => {
  const rowChecks = document.querySelectorAll('.rowCheck');
  const selectedCount = document.querySelectorAll('.rowCheck:checked').length;

  if (selectedCount > 0) {
    // すでに選択行がある → 全解除
    rowChecks.forEach(cb => {
      cb.checked = false;
      cb.closest('tr').classList.remove('selected');
    });
    checkAll.checked = false; // 見た目もOFFに戻す
  } else {
    // 選択行が0 → 全選択
    rowChecks.forEach(cb => {
      cb.checked = true;
      cb.closest('tr').classList.add('selected');
    });
    checkAll.checked = true;
  }

  updateUndoRedoButtons();
});

copySelectedBtn.addEventListener('click', () => {
  const rowChecks = document.querySelectorAll('.rowCheck:checked');
  if (rowChecks.length === 0) return;

  pushUndo();

  // チェックされている行を順番にコピー
  rowChecks.forEach((cb, index) => {
    const rowIndex = Array.from(document.querySelectorAll('.rowCheck')).indexOf(cb);
    const original = data[rowIndex];

    // ディープコピーして末尾に追加
    const copied = { ...original };
    data.push(copied);
  });

  renderTable();
  updateUndoRedoButtons();
});

window.addEventListener('keydown', (e) => {
  // Ctrl + A
  if (e.ctrlKey && e.key.toLowerCase() === 'a') {
    e.preventDefault();

    const rowChecks = document.querySelectorAll('.rowCheck');
    rowChecks.forEach(cb => {
      cb.checked = true;
      cb.closest('tr').classList.add('selected');
    });

    checkAll.checked = true;
    updateUndoRedoButtons();
  }

  // Ctrl + Z → Undo  
  if (e.ctrlKey && !e.shiftKey && e.key.toLowerCase() === 'z') {
    e.preventDefault();
    undoBtn.click();
  }

  // Ctrl + Shift + Z → Redo
  if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'z') {
    e.preventDefault();
    redoBtn.click();
  }
  
  // Alt + ↑ で上へ移動
  if (e.altKey && e.key === 'ArrowUp') {
    e.preventDefault();

    const sel = getSelectionState();
    if (sel.count === 0 || !sel.continuous) return; // 非連続は移動不可
    if (sel.start === 0) return; // 一番上は移動不可

    pushUndo();

    const moving = data.splice(sel.start, sel.count);
    data.splice(sel.start - 1, 0, ...moving);

    renderTable();

    // 移動後も選択状態を維持
    const checks = document.querySelectorAll('.rowCheck');
    for (let i = 0; i < checks.length; i++) {
      checks[i].checked = (i >= sel.start - 1 && i < sel.start - 1 + sel.count);
      checks[i].closest('tr').classList.toggle('selected', checks[i].checked);
    }

    updateUndoRedoButtons();
  }

  // Alt + ↓ で下へ移動
  if (e.altKey && e.key === 'ArrowDown') {
    e.preventDefault();

    const sel = getSelectionState();
    if (sel.count === 0 || !sel.continuous) return; // 非連続は移動不可
    if (sel.end === data.length - 1) return; // 一番下は移動不可

    pushUndo();

    const moving = data.splice(sel.start, sel.count);
    data.splice(sel.start + 1, 0, ...moving);

    renderTable();

    // 移動後も選択状態を維持
    const checks = document.querySelectorAll('.rowCheck');
    for (let i = 0; i < checks.length; i++) {
      checks[i].checked = (i >= sel.start + 1 && i < sel.start + 1 + sel.count);
      checks[i].closest('tr').classList.toggle('selected', checks[i].checked);
    }

    updateUndoRedoButtons();
  }
  
	// Esc キー処理（ダイアログ優先 → 選択解除）
	if (e.key === 'Escape') {
	  e.preventDefault();

	  // 1. 開いているダイアログがあれば閉じる
	  const openDialog = document.querySelector('dialog[open]');
	  if (openDialog) {
	    openDialog.close();
	    return;
	  }

	  // 2. ダイアログが開いていない → 選択解除
	  const rowChecks = document.querySelectorAll('.rowCheck');
	  rowChecks.forEach(cb => {
	    cb.checked = false;
	    cb.closest('tr').classList.remove('selected');
	  });

	  checkAll.checked = false;
	  updateUndoRedoButtons();
	}
});


function getSelectedRange() {
  const checks = Array.from(document.querySelectorAll('.rowCheck'));
  const selected = checks
    .map((cb, i) => cb.checked ? i : -1)
    .filter(i => i !== -1);

  if (selected.length === 0) return null;

  const start = selected[0];
  const end = selected[selected.length - 1];

  // 連続しているか確認
  for (let i = start; i <= end; i++) {
    if (!checks[i].checked) return null; // 非連続
  }

  return { start, end };
}function getSelectionState() {
  const checks = Array.from(document.querySelectorAll('.rowCheck'));
  const selected = checks
    .map((cb, i) => cb.checked ? i : -1)
    .filter(i => i !== -1);

  if (selected.length === 0) {
    return { count: 0, continuous: false, start: null, end: null };
  }

  const start = selected[0];
  const end = selected[selected.length - 1];

  let continuous = true;
  for (let i = start; i <= end; i++) {
    if (!checks[i].checked) {
      continuous = false;
      break;
    }
  }

  return { count: selected.length, continuous, start, end };
}
